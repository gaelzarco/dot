format = """\\[$hostname$username $directory\\]$git_branch$git_state$git_status$character"""

add_newline = false

[hostname]
format = "$hostname::"
ssh_only = false

[username]
format = "$user"
show_always = true

[directory]
format = "$path"

[battery]
format = "[$symbol$percentage]($style)"
disabled = false
charging_symbol = ' '
full_symbol = ' '
discharging_symbol = ' '

[[battery.display]]
threshold = 25
style = "red"

[character]
success_symbol = " ➜"
error_symbol = " ➜"

[git_branch]
format = " [$branch](gray)"

[git_status]
format = "[[($conflicted$untracked$modified$staged$renamed$deleted)](gray)($ahead_behind$stashed)]($style)"
style = "gray"
conflicted = "⇆"
untracked = "○"
modified = "⠂"
staged = "⠒"
ahead = "⠶"
behind = "↓"
renamed = "_"
deleted = "⨯"
stashed = "↷"

[git_state]
format = '\([$state( $progress_current/$progress_total)](gray)\)'

[cmd_duration]
format = "[$duration](gray)"
min_time = 0
show_milliseconds = true

[package]
disabled = false

[erlang]
symbol = "ⓔ"

[nodejs]
symbol = "[⬢](green)"

[pulumi]
symbol = "🧊"

[typst]
symbol = "t"
